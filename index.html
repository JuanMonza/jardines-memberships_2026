<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jardines del Renacer - Búsqueda de Membresía</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Tipografía estilo Apple */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        
        /* Fondo Líquido / Mesh Gradient Azul */
        .bg-liquid {
            background-color: #003366;
            background-image: 
                radial-gradient(at 0% 0%, hsla(217,100%,50%,0.8) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(200,100%,30%,0.9) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(220,100%,40%,0.7) 0, transparent 50%),
                radial-gradient(at 50% 100%, hsla(210,100%,20%,1) 0, transparent 50%);
            background-attachment: fixed;
            background-size: cover;
        }

        /* Glassmorphism Card (iOS Style) */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }

        /* Contenedor del Logo Cristalino */
        .logo-container {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }

        /* Input de Cristal */
        .glass-input {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.95);
            border-color: #0056b3;
            outline: none;
            box-shadow: 0 0 0 4px rgba(0, 86, 179, 0.15), inset 0 1px 2px rgba(0,0,0,0.05);
        }

        /* Botón de Cristal Azul */
        .glass-btn {
            background: rgba(0, 64, 128, 0.85); /* Azul Jardines */
            color: white;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 20px rgba(0, 43, 94, 0.3);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .glass-btn:hover {
            background: rgba(0, 43, 94, 0.95);
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(0, 43, 94, 0.4);
        }
        .glass-btn:active {
            transform: translateY(0);
            box-shadow: 0 4px 10px rgba(0, 43, 94, 0.3);
        }

        /* Loader iOS Style */
        .loader {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #ffffff;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Círculos decorativos de fondo */
        .blob-1 { position: absolute; width: 300px; height: 300px; background: rgba(0, 102, 255, 0.4); border-radius: 50%; filter: blur(80px); top: -100px; left: -100px; z-index: 0; }
        .blob-2 { position: absolute; width: 400px; height: 400px; background: rgba(0, 204, 255, 0.3); border-radius: 50%; filter: blur(100px); bottom: -150px; right: -100px; z-index: 0; }
    </style>
</head>
<body class="bg-liquid min-h-screen flex items-center justify-center p-4 relative">

    <!-- Elementos líquidos de fondo -->
    <div class="blob-1 pointer-events-none"></div>
    <div class="blob-2 pointer-events-none"></div>

    <div class="glass-card w-full max-w-md rounded-[2rem] p-8 relative z-10">
        <!-- Reflejo superior interior -->
        <div class="absolute top-0 left-0 w-full h-24 bg-gradient-to-b from-white/40 to-transparent rounded-t-[2rem] pointer-events-none"></div>

        <div class="text-center mb-8 relative z-10">
            <div class="logo-container p-4 rounded-2xl inline-block mb-5">
                <img src="/logo-oficial.webp" alt="Logo Jardines del Renacer" class="h-16 mx-auto object-contain drop-shadow-sm" onerror="this.src='/logo-oficial.webp'">
            </div>
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Consulta de Membresía</h1>
            <p class="text-gray-600 mt-2 text-sm font-medium">Verifique su estado ingresando su documento</p>
        </div>

        <form id="searchForm" class="space-y-5 relative z-10">
            <div>
                <label for="cedula" class="block text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1">Cédula o ID Persona</label>
                <input type="text" id="cedula" name="cedula" required
                    class="glass-input block w-full px-5 py-3.5 rounded-xl text-lg font-semibold text-gray-800 placeholder-gray-400"
                    placeholder="Ej. 1234567890 o IDPERSONA">
            </div>
            <button type="submit" id="submitBtn"
                class="glass-btn w-full flex justify-center items-center py-3.5 px-4 rounded-xl text-lg font-semibold">
                <span id="btnText">Consultar Estado</span>
                <span id="btnLoader" class="loader hidden ml-3"></span>
            </button>
        </form>

        <div id="errorContainer" class="hidden mt-6 bg-red-50/80 backdrop-blur-md border border-red-200 p-4 rounded-xl shadow-sm relative z-10">
            <div class="flex items-center">
                <div class="flex-shrink-0 bg-red-100 rounded-full p-1">
                    <svg class="h-5 w-5 text-red-600" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
                    </svg>
                </div>
                <p id="errorText" class="ml-3 text-sm font-medium text-red-800"></p>
            </div>
        </div>

        <div id="resultContainer" class="hidden mt-8 relative z-10 transition-all duration-500 ease-out transform scale-95" style="opacity: 0;">
            <!-- Tarjeta Virtual Estilo Crédito/Membresía -->
            <div class="relative w-full max-w-sm mx-auto rounded-2xl overflow-hidden shadow-[0_20px_50px_rgba(0,43,94,0.4)] bg-gradient-to-br from-[#0f2027] via-[#203a43] to-[#2c5364] text-white">
                <!-- Patrón de seguridad de fondo -->
                <div class="absolute inset-0 opacity-[0.03] bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4IiBoZWlnaHQ9IjgiPjxyZWN0IHdpZHRoPSI4IiBoZWlnaHQ9IjgiIGZpbGw9IiNmZmYiLz48L3N2Zz4=')]"></div>
                <div class="absolute top-0 left-0 w-full h-full bg-gradient-to-b from-white/20 to-transparent pointer-events-none"></div>
                
                <!-- Destellos de luz (Holograma) -->
                <div class="absolute -right-16 -top-16 w-48 h-48 bg-blue-400/20 rounded-full blur-3xl pointer-events-none"></div>
                <div class="absolute -left-16 -bottom-16 w-48 h-48 bg-cyan-400/20 rounded-full blur-3xl pointer-events-none"></div>

                <div class="p-6 relative z-10">
                    <!-- Header: Logo y Estado -->
                    <div class="flex justify-between items-start mb-6">
                        <img src="/logo-oficial.webp" alt="Logo" class="h-10 object-contain drop-shadow-md brightness-0 invert opacity-90" onerror="this.src='/logo-oficial.webp'">
                        <div id="badgeContainer" class="px-3 py-1 rounded-full border shadow-lg backdrop-blur-md">
                            <span id="resEstado" class="text-[10px] font-bold uppercase tracking-widest text-white"></span>
                        </div>
                    </div>

                    <!-- Chip Inteligente -->
                    <div class="mb-4">
                        <div class="w-10 h-7 rounded bg-gradient-to-br from-yellow-100 to-yellow-400 opacity-80 border border-yellow-500/50 flex flex-wrap shadow-inner relative overflow-hidden">
                            <div class="absolute top-1/2 left-0 w-full h-[1px] bg-yellow-700/20"></div>
                            <div class="absolute top-0 left-1/3 w-[1px] h-full bg-yellow-700/20"></div>
                            <div class="absolute top-0 right-1/3 w-[1px] h-full bg-yellow-700/20"></div>
                        </div>
                    </div>

                    <!-- Nombre del Titular -->
                    <div class="mb-6">
                        <p class="text-[9px] text-blue-100 uppercase tracking-widest mb-1 opacity-70">Titular de la Membresía</p>
                        <h2 id="resNombre" class="text-xl sm:text-2xl font-bold tracking-tight text-white drop-shadow-md leading-tight uppercase"></h2>
                    </div>

                    <!-- Información Adicional -->
                    <div class="grid grid-cols-2 gap-y-4 gap-x-2">
                        <div>
                            <p class="text-[8px] text-blue-100 uppercase tracking-widest opacity-70">ID Contrato</p>
                            <p id="resContrato" class="text-sm font-semibold tracking-wider mt-0.5 text-white"></p>
                        </div>
                        <div>
                            <p class="text-[8px] text-blue-100 uppercase tracking-widest opacity-70">Documento</p>
                            <p id="resDocumento" class="text-sm font-semibold tracking-wider mt-0.5 text-white"></p>
                        </div>
                        <div class="col-span-1 border-t border-white/10 pt-3 mt-1">
                            <p class="text-[8px] text-blue-100 uppercase tracking-widest opacity-70">Celular</p>
                            <p id="resCelular" class="text-sm font-semibold tracking-wider mt-0.5 text-white truncate"></p>
                        </div>
                        <div class="col-span-1 border-t border-white/10 pt-3 mt-1">
                            <p class="text-[8px] text-blue-100 uppercase tracking-widest opacity-70">Ubicación</p>
                            <p id="resUbicacion" class="text-sm font-semibold tracking-wider mt-0.5 text-white truncate"></p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Confirmación Oficial -->
            <div class="mt-5 text-center">
                <p class="text-xs font-bold text-green-700 bg-green-100/90 inline-flex items-center px-4 py-2 rounded-full border border-green-200/50 shadow-sm backdrop-blur-md">
                    <svg class="w-4 h-4 mr-1.5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Membresía Oficial Verificada
                </p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const cedula = document.getElementById('cedula').value.trim();
            if (!cedula) return;

            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            const submitBtn = document.getElementById('submitBtn');
            const resultContainer = document.getElementById('resultContainer');
            const errorContainer = document.getElementById('errorContainer');
            const errorText = document.getElementById('errorText');

            // Efecto de transición
            resultContainer.style.opacity = '0';
            resultContainer.classList.remove('scale-100');
            resultContainer.classList.add('scale-95');
            setTimeout(() => resultContainer.classList.add('hidden'), 300);
            errorContainer.classList.add('hidden');
            
            submitBtn.disabled = true;
            btnText.textContent = 'Consultando...';
            btnLoader.classList.remove('hidden');

            try {
                console.log(`[RADAR 1] Buscando documento: "${cedula}"`);
                const response = await fetch(`/api/contratantes?cedula=${encodeURIComponent(cedula)}`);
                console.log(`[RADAR 2] Status HTTP de Vercel: ${response.status}`);

                const textoCrudo = await response.text();
                console.log(`[RADAR 3] Respuesta cruda del servidor:`, textoCrudo);

                let data;
                try {
                    data = JSON.parse(textoCrudo);
                    console.log(`[RADAR 4] JSON interpretado correctamente:`, data);
                } catch (e) {
                    console.error(`[RADAR ERROR] El servidor no devolvió datos válidos.`);
                    throw new Error(`Fallo interno del servidor (Status: ${response.status}). Revisa la consola F12.`);
                }

                if (response.ok && data.success) {
                    const info = data.data;
                    
                    const nombreLimpio = info.nombre_contratante || info.nombre || 'N/A';
                    document.getElementById('resNombre').textContent = nombreLimpio.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
                    
                    const estado = info.estado || 'N/A';
                    const estadoEl = document.getElementById('resEstado');
                    estadoEl.textContent = estado.toUpperCase();
                    
                    // Badges de estado para tarjeta oscura
                    const badgeContainer = document.getElementById('badgeContainer');
                    if (estado.toLowerCase() === 'activo') {
                        badgeContainer.className = 'px-3 py-1 rounded-full border shadow-lg backdrop-blur-md bg-emerald-500/30 border-emerald-400/50';
                        estadoEl.className = 'text-[10px] font-bold uppercase tracking-widest text-emerald-50';
                    } else {
                        badgeContainer.className = 'px-3 py-1 rounded-full border shadow-lg backdrop-blur-md bg-rose-500/30 border-rose-400/50';
                        estadoEl.className = 'text-[10px] font-bold uppercase tracking-widest text-rose-50';
                    }

                    document.getElementById('resContrato').textContent = info.id_contrato || 'N/A';
                    document.getElementById('resDocumento').textContent = info.id_persona || info.cedula || 'N/A';
                    document.getElementById('resCelular').textContent = info.celular || 'N/A';
                    
                    const ciudad = info.ciudad || '';
                    const depto = info.departamento || '';
                    const ubicacion = [ciudad, depto].filter(Boolean).join(' - ');
                    document.getElementById('resUbicacion').textContent = ubicacion || 'N/A';

                    resultContainer.classList.remove('hidden');
                    // Pop in effect
                    setTimeout(() => {
                        resultContainer.style.opacity = '1';
                        resultContainer.classList.remove('scale-95');
                        resultContainer.classList.add('scale-100');
                    }, 50);
                } else {
                    console.warn(`[RADAR 5] Rechazado por la API:`, data);
                    errorText.textContent = `Aviso de Base de Datos: ${data.message || data.error || 'No encontrado'}`;
                    errorContainer.classList.remove('hidden');
                }
            } catch (err) {
                console.error("[RADAR CRÍTICO]", err);
                errorText.textContent = `Error del sistema: ${err.message}`;
                errorContainer.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                btnText.textContent = 'Consultar Estado';
                btnLoader.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
